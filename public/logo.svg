<svg
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink"
    viewBox="0 0 200 200">

    <image
        href="https://i.ibb.co/BH2rsRW2/Unistar-logo.png"
        x="0"
        y="0"
        width="200"
        height="200" />

</svg>
  <defs>
    <!-- Gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#123C74" />
      <stop offset="100%" stop-color="#1E5A93" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E5A93" />
      <stop offset="100%" stop-color="#2FA7B8" />
    </linearGradient>
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#8BBAC5" />
      <stop offset="100%" stop-color="#2FA7B8" />
    </linearGradient>
    
    <!-- Text Paths for Upright Circular Typography -->
    <!-- Top arc: left-to-right clockwise, radius 76 -->
    <path id="topArc" d="M 24,100 A 76,76 0 0,1 176,100" fill="none" />
    <!-- Bottom arc: right-to-left counter-clockwise along the bottom, radius 76 -->
    <path id="bottomArc" d="M 176,100 A 76,76 0 0,0 24,100" fill="none" />
  </defs>

  <!-- Clean Off-White Inner Disc Background -->
  <circle cx="100" cy="100" r="95" fill="#FBFDFE" stroke="#E3ECEF" stroke-width="1.5" />

  <!-- Outer Double Rings -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#123C74" stroke-width="2" />
  <circle cx="100" cy="100" r="86" fill="none" stroke="#2FA7B8" stroke-width="1" stroke-dasharray="2 2" opacity="0.8" />
  <circle cx="100" cy="100" r="68" fill="none" stroke="#123C74" stroke-width="1.5" />
  <circle cx="100" cy="100" r="64" fill="none" stroke="#2FA7B8" stroke-width="1" opacity="0.5" />

  <!-- Typography: UNISTAR CHEMICALS (top) and CREATE CHEMISTRY (bottom) -->
  <text font-family="'Inter', 'Space Grotesk', sans-serif" font-weight="950" font-size="14.5" fill="#123C74" letter-spacing="1.8">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">UNISTAR CHEMICALS</textPath>
  </text>
  
  <text font-family="'Inter', 'Space Grotesk', sans-serif" font-weight="850" font-size="12.5" fill="#1E5A93" letter-spacing="2">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">CREATE CHEMISTRY</textPath>
  </text>

  <!-- Side Bullet Dividers -->
  <circle cx="21" cy="100" r="2.5" fill="#2FA7B8" />
  <line x1="10" y1="100" x2="16" y2="100" stroke="#2FA7B8" stroke-width="1.5" />
  <circle cx="179" cy="100" r="2.5" fill="#2FA7B8" />
  <line x1="184" y1="100" x2="190" y2="100" stroke="#2FA7B8" stroke-width="1.5" />

  <!-- INNER ATOM DESIGN -->
  <g id="atom-core">
    <!-- Orbits: Three intersecting ellipses rotated by 60 degrees -->
    <ellipse cx="100" cy="100" rx="46" ry="17" fill="none" stroke="url(#tealGrad)" stroke-width="2" opacity="0.85" transform="rotate(0 100 100)" />
    <ellipse cx="100" cy="100" rx="46" ry="17" fill="none" stroke="url(#tealGrad)" stroke-width="2" opacity="0.85" transform="rotate(60 100 100)" />
    <ellipse cx="100" cy="100" rx="46" ry="17" fill="none" stroke="url(#tealGrad)" stroke-width="2" opacity="0.85" transform="rotate(120 100 100)" />
    
    <!-- Central Atom Core Nucleus Glow -->
    <circle cx="100" cy="100" r="16" fill="#123C74" opacity="0.15" />
    <circle cx="100" cy="100" r="12" fill="none" stroke="#2FA7B8" stroke-width="1" stroke-dasharray="1 1" />

    <!-- 5-Point Star in the Center (Unistar Star Symbol) -->
    <polygon points="100,87 104,95 112,96 106,102 108,110 100,105 92,110 94,102 88,96 96,95" fill="url(#starGrad)" stroke="#123C74" stroke-width="1.5" stroke-linejoin="round" />

    <!-- Orbiting Molecular/Electron Nodes -->
    <!-- Node 1: on Orbit 1 -->
    <g transform="translate(141, 100) rotate(30)">
      <polygon points="0,-6 5,-3 5,3 0,6 -5,3 -5,-3" fill="#FFFFFF" stroke="#123C74" stroke-width="1.5" />
      <circle cx="0" cy="0" r="2" fill="#2FA7B8" />
    </g>
    
    <!-- Node 2: on Orbit 2 -->
    <g transform="translate(73, 140) rotate(90)">
      <polygon points="0,-6 5,-3 5,3 0,6 -5,3 -5,-3" fill="#FFFFFF" stroke="#123C74" stroke-width="1.5" />
      <circle cx="0" cy="0" r="2" fill="#2FA7B8" />
    </g>

    <!-- Node 3: on Orbit 3 -->
    <g transform="translate(73, 60) rotate(150)">
      <polygon points="0,-6 5,-3 5,3 0,6 -5,3 -5,-3" fill="#FFFFFF" stroke="#123C74" stroke-width="1.5" />
      <circle cx="0" cy="0" r="2" fill="#2FA7B8" />
    </g>
    
    <!-- Small orbiting dot electron -->
    <circle cx="120" cy="74" r="3" fill="#2FA7B8" stroke="#FFFFFF" stroke-width="1" />
  </g>
</svg>
